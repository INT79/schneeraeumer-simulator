<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>❄ Schneeräum-Simulator V2 – IM NORDEN</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #111; font-family: Arial, sans-serif; }
canvas#gameCanvas { display: block; position: fixed; top: 0; left: 0; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 10;
}

#title {
  position: absolute; top: 14px; left: 14px;
  color: #FFD600; font-size: 17px; font-weight: bold;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
  letter-spacing: 1px;
}

#status-box {
  position: absolute; top: 44px; left: 14px;
  background: rgba(0,0,0,0.55); border-radius: 7px;
  padding: 8px 13px; color: #fff; font-size: 13px; line-height: 1.8;
  text-shadow: 1px 1px 2px #000;
  border: 1px solid rgba(255,255,255,0.12);
}

#top-right {
  position: absolute; top: 14px; right: 14px;
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
}

#clock {
  color: #fff; font-size: 21px; font-weight: bold;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
}

#weather-icon { font-size: 26px; }

#minimap-wrap {
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 4px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

#minimap { display: block; }

#speedo-wrap {
  position: absolute; bottom: 14px; right: 14px;
}

#speedo { display: block; }

#progress-bar {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); border-radius: 20px;
  padding: 6px 18px; color: #fff; font-size: 13px;
  border: 1px solid rgba(255,255,255,0.2);
  text-shadow: 1px 1px 3px #000;
}

#controls-box {
  position: absolute; bottom: 14px; left: 14px;
  background: rgba(0,0,0,0.55); border-radius: 7px;
  padding: 8px 12px; color: rgba(255,255,255,0.75);
  font-size: 11px; line-height: 1.75;
  border: 1px solid rgba(255,255,255,0.12);
}

/* Weather panel */
#weather-panel {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(5,5,25,0.95);
  border: 2px solid #FFD600; border-radius: 12px;
  padding: 22px 26px; z-index: 20;
  display: none; pointer-events: all;
  min-width: 290px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.7);
}
#weather-panel h3 { color: #FFD600; text-align: center; margin-bottom: 14px; font-size: 16px; }
.w-btn {
  display: block; width: 100%; padding: 10px 14px;
  margin: 5px 0; background: rgba(255,255,255,0.08);
  color: #eee; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 7px; cursor: pointer; font-size: 14px;
  text-align: left; transition: background 0.15s;
}
.w-btn:hover, .w-btn.active { background: rgba(255,214,0,0.25); border-color: #FFD600; color: #FFD600; }
#w-close {
  display: block; margin-top: 12px; color: rgba(255,255,255,0.4);
  text-align: center; cursor: pointer; font-size: 12px;
  pointer-events: all;
}
</style>
</head>

<script>
'use strict';
// ================================================================
//  SCHNEERÄUM-SIMULATOR V2  –  IM NORDEN
// ================================================================

// ================================================================
//  SOUND SYSTEM (Web Audio API – kein CDN)
// ================================================================
let audioCtx = null;
let soundEnabled = true;
let motorOsc = null, motorGain = null;
let brushNoise = null, brushGain = null, brushBuffer = null;
let spreaderLastSound = 0;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Motor: Sägezahn-Oszillator, 60-180Hz je nach Geschwindigkeit
    motorGain = audioCtx.createGain();
    motorGain.gain.value = 0;
    motorOsc = audioCtx.createOscillator();
    motorOsc.type = 'sawtooth';
    motorOsc.frequency.value = 65;
    const motorFilter = audioCtx.createBiquadFilter();
    motorFilter.type = 'lowpass';
    motorFilter.frequency.value = 350;
    motorOsc.connect(motorFilter);
    motorFilter.connect(motorGain);
    motorGain.connect(audioCtx.destination);
    motorOsc.start();

    // Bürste: weißes Rauschen (loopend)
    const bufLen = audioCtx.sampleRate * 2;
    brushBuffer = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const dat = brushBuffer.getChannelData(0);
    for (let i = 0; i < bufLen; i++) dat[i] = Math.random() * 2 - 1;

    brushGain = audioCtx.createGain();
    brushGain.gain.value = 0;
    const brushFilter = audioCtx.createBiquadFilter();
    brushFilter.type = 'bandpass';
    brushFilter.frequency.value = 900;
    brushFilter.Q.value = 0.4;
    brushGain.connect(brushFilter);
    brushFilter.connect(audioCtx.destination);
    _restartBrushNoise();
  } catch(e) { audioCtx = null; }
}

function _restartBrushNoise() {
  if (!audioCtx || !brushBuffer) return;
  if (brushNoise) { try { brushNoise.stop(); } catch(e){} }
  brushNoise = audioCtx.createBufferSource();
  brushNoise.buffer = brushBuffer;
  brushNoise.loop = true;
  brushNoise.connect(brushGain);
  brushNoise.start();
}

function updateMotorSound(spd) {
  if (!audioCtx || !soundEnabled || document.visibilityState !== 'visible') {
    if (motorGain) motorGain.gain.setTargetAtTime(0, audioCtx ? audioCtx.currentTime : 0, 0.1);
    return;
  }
  const t = audioCtx.currentTime;
  const freq = 60 + Math.min(spd / 60, 1) * 120;
  motorOsc.frequency.setTargetAtTime(freq, t, 0.12);
  const vol = onFoot ? 0.03 : 0.06 + Math.min(spd / 60, 1) * 0.10;
  motorGain.gain.setTargetAtTime(vol, t, 0.08);
}

function updateBrushSound(active) {
  if (!audioCtx || !brushGain) return;
  const vol = (active && soundEnabled && document.visibilityState === 'visible') ? 0.07 : 0;
  brushGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.12);
}

function playSpreaderSound() {
  if (!audioCtx || !soundEnabled || document.visibilityState !== 'visible') return;
  const now = audioCtx.currentTime;
  if (now - spreaderLastSound < 0.18) return;
  spreaderLastSound = now;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 180 + Math.random() * 320;
  gain.gain.setValueAtTime(0.10, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.09);
}

document.addEventListener('keydown', () => initAudio(), { once: true });
document.addEventListener('click',   () => initAudio(), { once: true });

// ---- Renderer ----
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xaabbcc, 0.006);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 600);
camera.position.set(0, 10, 18);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- Physics ----
const world = new CANNON.World();
world.gravity.set(0, -9.82, 0);
world.broadphase = new CANNON.SAPBroadphase(world);
world.solver.iterations = 10;
world.allowSleep = true;

const matGround  = new CANNON.Material('gnd');
const matVehicle = new CANNON.Material('veh');
const contactGV  = new CANNON.ContactMaterial(matGround, matVehicle, { friction: 0.15, restitution: 0.05 });
world.addContactMaterial(contactGV);

// ---- Snow Grid ----
const GRID  = 50;
const MSIZE = 300;
const CELL  = MSIZE / GRID;
const snowGrid = new Float32Array(GRID * GRID).fill(1);

const snowCvs = document.createElement('canvas');
snowCvs.width = snowCvs.height = 512;
const snowCtx = snowCvs.getContext('2d');
const snowTex = new THREE.CanvasTexture(snowCvs);

function rebuildSnowTex() {
  const cw = 512 / GRID;
  // Geräumte Zellen: dunkler Asphalt; Schnee: weiß
  snowCtx.fillStyle = 'rgba(60,60,65,0.95)';
  snowCtx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      const v = snowGrid[i * GRID + j];
      if (v > 0.05) {
        // Schnee: weiß, scharfer Übergang
        snowCtx.fillStyle = `rgba(240,245,255,${Math.min(1, v).toFixed(2)})`;
        snowCtx.fillRect(i * cw, j * cw, cw + 1, cw + 1);
      }
    }
  }
  snowTex.needsUpdate = true;
}
rebuildSnowTex();

// ---- Ground (Asphalt-Basis) ----
const groundGeo = new THREE.PlaneGeometry(MSIZE, MSIZE);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// ---- Schnee-Overlay (liegt ÜBER allen Straßen/Gehwegen) ----
const snowOverlayGeo = new THREE.PlaneGeometry(MSIZE, MSIZE);
const snowOverlayMat = new THREE.MeshLambertMaterial({
  map: snowTex,
  transparent: true,
  opacity: 1.0,
  depthWrite: false,
  polygonOffset: true,
  polygonOffsetFactor: -1,
  polygonOffsetUnits: -1
});
const snowOverlay = new THREE.Mesh(snowOverlayGeo, snowOverlayMat);
snowOverlay.rotation.x = -Math.PI / 2;
snowOverlay.position.y = 0.08; // Über allen Straßenplatten (max y=0.055)
scene.add(snowOverlay);

const gBody = new CANNON.Body({ mass: 0, material: matGround });
gBody.addShape(new CANNON.Plane());
gBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
world.addBody(gBody);

// ---- Lighting ----
const ambLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambLight);

const sunLight = new THREE.DirectionalLight(0xfff4e0, 1.0);
sunLight.position.set(60, 90, 40);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near   = 1;
sunLight.shadow.camera.far    = 400;
sunLight.shadow.camera.left   = -160;
sunLight.shadow.camera.right  =  160;
sunLight.shadow.camera.top    =  160;
sunLight.shadow.camera.bottom = -160;
scene.add(sunLight);

// ================================================================
//  HELPERS
// ================================================================
function box(w, h, d, color, px, py, pz, ry = 0) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(px, py, pz);
  m.rotation.y = ry;
  m.castShadow = m.receiveShadow = true;
  return m;
}
function cyl(rt, rb, h, seg, color, px, py, pz, rx = 0, rz = 0) {
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(rt, rb, h, seg),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(px, py, pz);
  m.rotation.x = rx; m.rotation.z = rz;
  m.castShadow = true;
  return m;
}

// ================================================================
//  MAP — STRASSEN, GEHWEGE, MARKIERUNGEN
// ================================================================
const COL_ROAD = 0x2e2e2e;
const COL_SIDE = 0xb0b0b0;
const COL_SNOW = 0xe8eef4;
const COL_GRASS = 0x3a6030;

function addPlane(w, d, color, px, py, pz) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set(px, py, pz);
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Main street (N-S along Z, x=0)
addPlane(7, 200, COL_ROAD,  0, 0.01, 0);
// Sidewalks left / right
addPlane(2.5, 200, COL_SIDE, -5.25, 0.05, 0);
addPlane(2.5, 200, COL_SIDE,  5.25, 0.05, 0);

// Grass behind sidewalks
addPlane(50, 200, COL_GRASS, -35, 0.01, 0);
addPlane(50, 200, COL_GRASS,  35, 0.01, 0);

// Cross streets (E-W)
const csZ = [-75, -35, 10, 52];
csZ.forEach(z => {
  addPlane(120, 6, COL_ROAD,   0, 0.015, z);
  addPlane(120, 2.5, COL_SIDE, 0, 0.055, z - 4.25);
  addPlane(120, 2.5, COL_SIDE, 0, 0.055, z + 4.25);
});

// Dashed centre line — main street
for (let z = -97; z < 98; z += 8) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(0.18, 4),
    new THREE.MeshLambertMaterial({ color: 0xffffff })
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set(0, 0.02, z);
  scene.add(m);
}
// Dashed lines — cross streets
csZ.forEach(z => {
  for (let x = -57; x < 57; x += 8) {
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(4, 0.18),
      new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    m.rotation.x = -Math.PI / 2;
    m.position.set(x, 0.02, z);
    scene.add(m);
  }
});

// Curbs (Bordstein) — slight raised edge
function addCurb(w, d, px, pz) {
  const m = box(w, 0.12, d, 0x999999, px, 0.06, pz);
  scene.add(m);
}
// Along main street
addCurb(0.15, 200, -4, 0);
addCurb(0.15, 200,  4, 0);

// ================================================================
//  BUILDINGS
// ================================================================
const bColors = [0xf4f0e4, 0xd3d3d3, 0xf0e4b8, 0xce8060, 0xcc5555];

const lanterns = [];

function addBuilding(cx, cz, w, d, h, ci, saddle) {
  const g = new THREE.Group();
  const col = bColors[ci % bColors.length];

  // Body
  const body = box(w, h, d, col, 0, h/2, 0);
  g.add(body);

  // Fenster
  const wMat = new THREE.MeshLambertMaterial({ color: 0x90c8e8, transparent: true, opacity: 0.75 });
  const rowCount = Math.max(1, Math.floor((h-1) / 2.5));
  const colCount = Math.max(1, Math.floor((w-1) / 2.5));
  for (let r = 0; r < rowCount; r++) {
    for (let c = 0; c < colCount; c++) {
      const wg = new THREE.BoxGeometry(0.75, 0.65, 0.05);
      const wm = new THREE.Mesh(wg, wMat);
      wm.position.set(-w/2 + 1.0 + c*2.5, 1.2 + r*2.5, d/2 + 0.01);
      g.add(wm);
    }
  }

  // Dach
  if (saddle) {
    const rGeo = new THREE.CylinderGeometry(0, w*0.55, 2.5, 4);
    const rMat = new THREE.MeshLambertMaterial({ color: 0x8b4010 });
    const rMesh = new THREE.Mesh(rGeo, rMat);
    rMesh.position.set(0, h + 1.25, 0);
    rMesh.rotation.y = Math.PI/4;
    rMesh.castShadow = true;
    g.add(rMesh);
    // snow on roof edge
    const sm = box(w + 0.2, 0.15, d + 0.2, COL_SNOW, 0, h + 0.08, 0);
    g.add(sm);
  } else {
    const sm = box(w + 0.15, 0.2, d + 0.15, COL_SNOW, 0, h + 0.1, 0);
    g.add(sm);
  }

  // Treppenstufen
  for (let s = 0; s < 2; s++) {
    const st = box(1.4, 0.12*(s+1), 0.28*(s+1), 0x999999, 0, 0.06*(s+1), d/2 + 0.14*(s+1));
    g.add(st);
  }

  g.position.set(cx, 0, cz);
  scene.add(g);

  // Physics
  const bb = new CANNON.Body({ mass: 0 });
  bb.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
  bb.position.set(cx, h/2, cz);
  world.addBody(bb);
}

const BLDGS = [
  // left side (negative x)
  [-18, -88, 8, 10, 6, 0, true],  [-18, -73, 8, 10, 6, 1, false],
  [-18, -56, 8, 10, 6, 2, true],  [-22, -22, 15, 12, 10, 3, false],
  [-18,   4, 8, 10, 6, 4, true],  [-18,  20, 8, 10, 6, 0, false],
  [-18,  36, 8, 10, 6, 1, true],  [-22,  62, 15, 12, 10, 2, false],
  [-18,  80, 8, 10, 6, 3, true],  [-18,  93, 8, 10, 6, 4, false],
  [-34, -55, 15, 12, 10, 1, false],[-34,  30, 15, 12, 10, 0, false],
  // right side (positive x)
  [18, -82, 8, 10, 6, 2, true],   [18, -66, 8, 10, 6, 3, false],
  [22, -48, 15, 12, 10, 4, false], [18, -13, 8, 10, 6, 0, true],
  [18,   6, 8, 10, 6, 1, false],  [18,  22, 8, 10, 6, 2, true],
  [18,  42, 8, 10, 6, 3, false],  [18,  60, 8, 10, 6, 4, true],
  [22,  78, 15, 12, 10, 0, false], [34, -72, 15, 12, 10, 3, false],
  [34,  14, 15, 12, 10, 1, false], [34,  68, 8, 10, 6, 2, true],
];
BLDGS.forEach(b => addBuilding(...b));

// ================================================================
//  STATIC OBJECTS
// ================================================================

// --- Laternen ---
function addLantern(px, pz) {
  const g = new THREE.Group();
  const pole = cyl(0.06, 0.06, 5.5, 8, 0x555555, 0, 2.75, 0);
  g.add(pole);
  const arm  = box(0.6, 0.06, 0.06, 0x555555, 0.3, 5.55, 0);
  g.add(arm);
  const headMat = new THREE.MeshLambertMaterial({ color: 0xffee88, emissive: new THREE.Color(0xffcc44), emissiveIntensity: 0 });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.3), headMat);
  head.position.set(0.6, 5.6, 0);
  g.add(head);
  const pl = new THREE.PointLight(0xffcc55, 0, 22);
  pl.position.set(0.6, 5.55, 0);
  g.add(pl);
  g.position.set(px, 0, pz);
  g.userData.pointLight = pl;
  g.userData.headMat = headMat;
  scene.add(g);
  lanterns.push(g);
}
for (let z = -100; z <= 100; z += 25) { addLantern(-5.8, z); }
for (let z = -87; z <= 100; z += 25)  { addLantern(5.8, z); }

// --- Poller ---
function addBollard(px, pz) {
  const g = new THREE.Group();
  g.add(cyl(0.1, 0.1, 0.85, 8, 0x222222, 0, 0.425, 0));
  g.add(cyl(0.115, 0.115, 0.12, 8, 0xFFD600, 0, 0.72, 0));
  g.position.set(px, 0, pz);
  scene.add(g);
}
for (let z = -100; z <= 100; z += 20) {
  addBollard(-6.4, z);
  addBollard(6.4, z);
}

// --- Stromkästen ---
function addElecBox(px, pz) {
  const m = box(0.5, 1.2, 0.5, 0x2e7a2e, px, 0.6, pz);
  scene.add(m);
}
addElecBox(-6.2, -32); addElecBox(6.2, 18); addElecBox(-6.2, 62);

// --- Bäume ---
function addTree(px, pz) {
  const g = new THREE.Group();
  g.add(cyl(0.22, 0.28, 2.2, 8, 0x5c3010, 0, 1.1, 0));
  const foliage = new THREE.Mesh(
    new THREE.SphereGeometry(1.6, 8, 8),
    new THREE.MeshLambertMaterial({ color: 0x2c5e20 })
  );
  foliage.position.set(0, 3.4, 0);
  foliage.castShadow = true;
  g.add(foliage);
  // Snow cap
  const sc = new THREE.Mesh(
    new THREE.SphereGeometry(1.1, 8, 6, 0, Math.PI*2, 0, Math.PI*0.4),
    new THREE.MeshLambertMaterial({ color: COL_SNOW })
  );
  sc.position.set(0, 4.4, 0);
  g.add(sc);
  g.position.set(px, 0, pz);
  scene.add(g);

// --- Zäune ---
function addFence(x1,z1,x2,z2,segs) {
  const dx = (x2-x1)/segs, dz = (z2-z1)/segs;
  for (let i = 0; i <= segs; i++) {
    const m = box(0.07, 1.1, 0.07, 0x888888, x1+dx*i, 0.55, z1+dz*i);
    scene.add(m);
  }
  const len = Math.hypot(x2-x1, z2-z1);
  const ay  = Math.atan2(z2-z1, x2-x1);
  for (let h = 0; h < 2; h++) {
    const bar = box(len, 0.05, 0.05, 0x888888, (x1+x2)/2, 0.4+h*0.5, (z1+z2)/2, -ay);
    scene.add(bar);
  }
}

function spawnParticle(pool, px, py, pz, vx, vy, vz, life) {
  for (let i = 0; i < pool.length; i++) {
    const p = pool[i];
    if (!p.active) {
      p.active = true; p.m.visible = true;
      p.m.position.set(px, py, pz);
      p.vx = vx; p.vy = vy; p.vz = vz; p.life = life;
      return;
    }
  }
}

function updatePool(pool, dt, gravity) {
  pool.forEach(p => {
    if (!p.active) return;
    p.m.position.x += p.vx * dt;
    p.m.position.y += p.vy * dt;
    p.m.position.z += p.vz * dt;
    p.vy -= gravity * dt;
    p.life -= dt;
    if (p.life <= 0 || p.m.position.y < -0.2) {
      p.active = false; p.m.visible = false;
    }
  });
}

function drawSpeedo(spd) {
  const cv = document.getElementById('speedo');
  const cx2d = cv.getContext('2d');
  const W = 160, H = 100, cx = 80, cy = 90, r = 72;
  cx2d.clearRect(0, 0, W, H);
  cx2d.beginPath();
  cx2d.arc(cx, cy, r, Math.PI*0.75, Math.PI*2.25);
  cx2d.fillStyle = 'rgba(0,0,0,0.7)'; cx2d.fill();
  cx2d.beginPath();
  cx2d.arc(cx, cy, r-8, Math.PI*0.75, Math.PI*2.25);
  cx2d.strokeStyle = '#333'; cx2d.lineWidth = 10; cx2d.stroke();
  const pct = Math.min(spd / 60, 1);
  cx2d.beginPath();
  cx2d.arc(cx, cy, r-8, Math.PI*0.75, Math.PI*0.75 + pct*Math.PI*1.5);
  cx2d.strokeStyle = spd < 30 ? '#00ff88' : spd < 50 ? '#ffaa00' : '#ff3300';
  cx2d.lineWidth = 10; cx2d.stroke();
  cx2d.fillStyle = '#fff'; cx2d.font = 'bold 20px Arial'; cx2d.textAlign = 'center';
  cx2d.fillText(Math.round(spd), cx, cy);
  cx2d.fillStyle = '#aaa'; cx2d.font = '10px Arial';
  cx2d.fillText('km/h', cx, cy + 14);
}

// Minimap (auf Spieler zentriert)
function drawMinimap(px, pz) {
  const cv = document.getElementById('minimap');
  const mc = cv.getContext('2d');
  const W = 150, H = 150, S = W / MSIZE;
  // Hilfsfunktion: Weltkoordinate → Minimap-Pixel (zentriert auf Spieler)
  const mx = (wx) => W/2 + (wx - px) * S;
  const mz = (wz) => H/2 + (wz - pz) * S;

  // Gras-Hintergrund
  mc.fillStyle = '#2a4a22';
  mc.fillRect(0,0,W,H);

  // Geräumte Schnee-Bereiche (dunkleres Grau auf der Minimap)
  const cw = W / GRID;
  const ch = H / GRID;
  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      if (snowGrid[i * GRID + j] < 0.1) {
        // Weltposition der Zelle
        const wx = -MSIZE/2 + i * CELL;
        const wz = -MSIZE/2 + j * CELL;
        mc.fillStyle = 'rgba(55,55,60,0.6)';
        mc.fillRect(mx(wx), mz(wz), CELL*S+1, CELL*S+1);
      }
    }
  }

  // Straßen
  mc.fillStyle = '#444';
  mc.fillRect(mx(-3.5), 0, 7*S, H);
  csZ.forEach(z => {
    mc.fillRect(0, mz(z-3), W, 6*S);
  });

  // Gebäude
  mc.fillStyle = '#777';
  BLDGS.forEach(([bx,bz,bw,bd]) => {
    mc.fillRect(mx(bx - bw/2), mz(bz - bd/2), bw*S, bd*S);
  });

  // NPC-Autos (rote Punkte)
  mc.fillStyle = '#ff4444';
  npcs.forEach(n => {
    mc.beginPath();
    mc.arc(mx(n.mesh.position.x), mz(n.mesh.position.z), 3, 0, Math.PI*2);
    mc.fill();
  });

  // Fußgänger (blaue Punkte)
  mc.fillStyle = '#4488ff';
  peds.forEach(p => {
    mc.beginPath();
    mc.arc(mx(p.mesh.position.x), mz(p.mesh.position.z), 2.5, 0, Math.PI*2);
    mc.fill();
  });

  // Spieler immer in der Mitte (weißer Punkt)
  mc.fillStyle = '#ffffff';
  mc.beginPath();
  mc.arc(W/2, H/2, 4, 0, Math.PI*2);
  mc.fill();

  mc.strokeStyle = 'rgba(255,255,255,0.3)';
  mc.lineWidth = 1; mc.strokeRect(0,0,W,H);
}

// Progress
let progressDirty = true;
function updateProgress() {
  let c = 0;
  for (let i = 0; i < snowGrid.length; i++) if (snowGrid[i] < 0.1) c++;
  const pct = Math.round(c / snowGrid.length * 100);
  document.getElementById('progress-bar').textContent = `Geräumt: ${pct}%`;
}

// Clock
function fmtTime(s) {
  const h = Math.floor(s / 3600) % 24;
  const m = Math.floor((s % 3600) / 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// Snow clearing
function wToGrid(x, z) {
  const gx = Math.floor((x + MSIZE/2) / CELL);
  const gz = Math.floor((z + MSIZE/2) / CELL);
  return [Math.max(0, Math.min(GRID-1, gx)), Math.max(0, Math.min(GRID-1, gz))];
}
function clearSnow(wx, wz, rad) {
  const cr = Math.ceil(rad / CELL);
  const [cx, cz] = wToGrid(wx, wz);
  let chg = false;
  for (let dx = -cr; dx <= cr; dx++) {
    for (let dz2 = -cr; dz2 <= cr; dz2++) {
      const gx = cx + dx, gz = cz + dz2;
      if (gx >= 0 && gx < GRID && gz >= 0 && gz < GRID) {
        const idx = gx * GRID + gz;
        if (snowGrid[idx] > 0.05) {
          snowGrid[idx] = 0; // sofortiger scharfer Übergang
          chg = true;
        }
      }
    }
  }
  return chg;
}

// ================================================================
//  DAY / NIGHT
// ================================================================
function updateDayNight(dt) {
  gameTime += dt * GAME_SPD;
  if (gameTime >= 86400) gameTime -= 86400;

  const h = gameTime / 3600;
  const daytime = h >= 6 && h < 20;
  const dusk    = (h >= 5 && h < 6) || (h >= 20 && h < 21);

  const sunAngle = ((h - 6) / 12) * Math.PI;
  sunLight.position.set(Math.cos(sunAngle)*80, Math.max(0, Math.sin(sunAngle))*80, 40);
  if (daytime) {
    sunLight.intensity = Math.max(0.1, Math.sin(sunAngle) * 0.9);
    ambLight.intensity = 0.55;
  } else if (dusk) {
    sunLight.intensity = 0.3;
    ambLight.intensity = 0.3;
  } else {
    sunLight.intensity = 0;
    ambLight.intensity = 0.12;
  }

  // Sky colour
  if (h < 5 || h >= 22) {
    scene.background = new THREE.Color(0x050510);
  } else if (dusk) {
    const t = (h < 6) ? (h - 5) : (21 - h);
    scene.background = new THREE.Color().lerpColors(
      new THREE.Color(0xff8833), new THREE.Color(0x88aacc), t
    );
  } else if (weather === 'sunny') {
    scene.background = new THREE.Color(0x87ceeb);
  } else {
    scene.background = new THREE.Color(0xaabbcc);
  }

  const lightsOn = h < 6.5 || h > 19.5;
  lanterns.forEach(l => {
    l.userData.pointLight.intensity = lightsOn ? 1.5 : 0;
    if (l.userData.headMat) l.userData.headMat.emissiveIntensity = lightsOn ? 1.0 : 0;
  });
  const hdsOn = h < 7 || h > 19;
  headL.intensity = hdsOn ? 3 : 0;
  headR.intensity = hdsOn ? 3 : 0;

  document.getElementById('clock').textContent = fmtTime(gameTime);
}

// ================================================================
//  MAIN LOOP
// ================================================================
let lastT = performance.now();
let beaconT = 0;
let texTimer = 0;
let progTimer = 0;
let texDirty  = false;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  // ---- Physics ----
  world.step(1/60, dt, 3);

  // ---- Vehicle input ----
  if (!onFoot) {
    if (keys['KeyW'])     engineForce = Math.min(engineForce + 200*dt, MAX_FORCE);
    else if (keys['KeyS']) engineForce = Math.max(engineForce - 200*dt, -MAX_FORCE*0.55);
    else                   engineForce *= 0.90;

    if      (keys['KeyA']) steeringVal = Math.min(steeringVal + 1.8*dt, MAX_STEER);
    else if (keys['KeyD']) steeringVal = Math.max(steeringVal - 1.8*dt, -MAX_STEER);
    else                   steeringVal *= 0.80;

    const brake = keys['Space'] ? MAX_BRAKE : 0;

    rayVehicle.setSteeringValue(steeringVal, 0);
    rayVehicle.setSteeringValue(steeringVal, 1);
    rayVehicle.applyEngineForce(engineForce, 2);
    rayVehicle.applyEngineForce(engineForce, 3);
    for (let i = 0; i < 4; i++) rayVehicle.setBrake(brake, i);

    // Upright stabilisation
    const up = new CANNON.Vec3(0, 1, 0);
    const bodyUp = chassisCannonBody.vectorToWorldFrame(new CANNON.Vec3(0, 1, 0));
    const ang = Math.acos(Math.min(1, bodyUp.dot(up)));
    if (ang > 0.08) {
      const torq = up.cross(bodyUp);
      chassisCannonBody.torque.x += torq.x * 600;
      chassisCannonBody.torque.z += torq.z * 600;
    }

    // Sync mesh
    vGroup.position.copy(chassisCannonBody.position);
    vGroup.quaternion.copy(chassisCannonBody.quaternion);

    // Speed
    const v = chassisCannonBody.velocity;
    const spd = Math.sqrt(v.x*v.x + v.z*v.z) * 3.6;
    drawSpeedo(spd);
    if (audioCtx) {
      updateMotorSound(spd);
      updateBrushSound(brushOn && spd > 0.5);
    }

    // Snow clearing
    if (brushOn && spd > 0.5) {
      const fwd = chassisCannonBody.vectorToWorldFrame(new CANNON.Vec3(0, 0, 1));
      const bx  = chassisCannonBody.position.x + fwd.x * 1.85;
      const bz  = chassisCannonBody.position.z + fwd.z * 1.85;
      if (clearSnow(bx, bz, 1.85)) texDirty = true;
      // brush particles
      if (Math.random() < 0.4) {
        spawnParticle(brushPool, bx + (Math.random()-0.5)*2.2, 0.3, bz + (Math.random()-0.5)*2.2,
          (Math.random()-0.5)*3, Math.random()*2+0.5, (Math.random()-0.5)*3, 0.6);
      }
      brushCyl.rotation.x += 10 * dt;
    }

    // Spreader
    if (spreaderOn && Math.random() < 0.5) {
      playSpreaderSound();
      const bk = chassisCannonBody.vectorToWorldFrame(new CANNON.Vec3(0, 0, -1));
      spawnParticle(spreadPool,
        chassisCannonBody.position.x + bk.x*1.8 + (Math.random()-0.5)*1.5,
        0.5,
        chassisCannonBody.position.z + bk.z*1.8 + (Math.random()-0.5)*1.5,
        (Math.random()-0.5)*2, Math.random()*0.6+0.2, (Math.random()-0.5)*2, 1.2);
    }

    // Camera
    const camOff = new THREE.Vector3(0, 7, 14);
    const camTgt = vGroup.localToWorld(camOff.clone());
    camera.position.lerp(camTgt, 0.07);
    camera.lookAt(vGroup.position.x, vGroup.position.y + 1, vGroup.position.z);

  } else {
    // Pedestrian mode
    if (playerPed) {
      const spd = 0.055;
      if (keys['KeyW']) {
        const fwd = new THREE.Vector3(
          -Math.sin(playerPed.rotation.y), 0, -Math.cos(playerPed.rotation.y)
        );
        playerPed.position.addScaledVector(fwd, spd);
      }
      if (keys['KeyS']) {
        const bk = new THREE.Vector3(
          Math.sin(playerPed.rotation.y), 0, Math.cos(playerPed.rotation.y)
        );
        playerPed.position.addScaledVector(bk, spd);
      }
      if (keys['KeyA']) playerPed.rotation.y += 0.04;
      if (keys['KeyD']) playerPed.rotation.y -= 0.04;

      // Schaufel-Animation
      if (shovelAnim > 0) {
        shovelAnim -= dt;
        const phase = shovelAnim * Math.PI * 6;
        playerPed.rotation.z = Math.sin(phase) * 0.3;
        // Schnee-Partikel vor der Figur spawnen
        if (Math.random() < 0.5) {
          const fwdX = -Math.sin(playerPed.rotation.y);
          const fwdZ = -Math.cos(playerPed.rotation.y);
          spawnParticle(shovelPool,
            playerPed.position.x + fwdX * (0.5 + Math.random() * 0.8),
            0.3 + Math.random() * 0.4,
            playerPed.position.z + fwdZ * (0.5 + Math.random() * 0.8),
            fwdX * (1 + Math.random() * 2) + (Math.random()-0.5),
            Math.random() * 2 + 0.5,
            fwdZ * (1 + Math.random() * 2) + (Math.random()-0.5),
            0.5);
        }
        // Schnee in Radius 1.5m räumen
        if (clearSnow(playerPed.position.x, playerPed.position.z, 1.5)) texDirty = true;
        if (shovelAnim <= 0) { playerPed.rotation.z = 0; }
      }

      const camOff = new THREE.Vector3(
        Math.sin(playerPed.rotation.y) * 5, 3, Math.cos(playerPed.rotation.y) * 5
      );
      camera.position.lerp(playerPed.position.clone().add(camOff), 0.1);
      camera.lookAt(playerPed.position.x, playerPed.position.y + 1, playerPed.position.z);
    }
    drawSpeedo(0);
  }

  // ---- NPCs ----
  npcs.forEach(n => {
    n.mesh.position.z += n.dir * n.spd;
    n.mesh.rotation.y  = n.dir > 0 ? Math.PI : 0;
    if (n.mesh.position.z > n.maxZ) n.dir = -1;
    if (n.mesh.position.z < n.minZ) n.dir =  1;
  });

  // ---- Pedestrians ----
  peds.forEach(p => {
    p.mesh.position.z += p.dir * p.spd;
    p.mesh.rotation.y  = p.dir > 0 ? Math.PI : 0;
    if (p.mesh.position.z > p.z2) p.dir = -1;
    if (p.mesh.position.z < p.z1) p.dir =  1;
  });

  // ---- Beacon ----
  beaconT += dt;
  const bOn = Math.sin(beaconT * 3.5) > 0;
  beaconDome.material.emissiveIntensity = bOn ? 1.2 : 0;
  beaconDome.material.color.setHex(bOn ? 0xFF8800 : 0xFF4400);

  // ---- Snow weather particles ----
  const activeSnow = snowFallTarget;
  if (activeSnow > 0) {
    const toSpawn = Math.floor(activeSnow * dt * 15);
    for (let i = 0; i < toSpawn; i++) {
      const cx3 = camera.position.x + (Math.random()-0.5)*40;
      const cz3 = camera.position.z + (Math.random()-0.5)*40;
      spawnParticle(snowPool, cx3, camera.position.y + 5 + Math.random()*8, cz3,
        (Math.random()-0.5)*0.5, -2.5 - Math.random()*1.5, (Math.random()-0.5)*0.5,
        4 + Math.random()*3);
    }
  }
  updatePool(snowPool,    dt, 0);
  updatePool(brushPool,   dt, 5);
  updatePool(spreadPool,  dt, 6);
  updatePool(collisionPool, dt, 8);
  updatePool(shovelPool,  dt, 4);

  // ---- Kollisions-Flash ----
  if (collisionFlash > 0) {
    collisionFlash -= dt;
    document.getElementById('hud').style.boxShadow =
      collisionFlash > 0 ? 'inset 0 0 0 3px red' : 'none';
    if (collisionFlash <= 0) document.getElementById('hud').style.boxShadow = 'none';
  }

  // ---- Snow refill ----
  if (snowRefill > 0) {
    for (let i = 0; i < snowGrid.length; i++) {
      if (snowGrid[i] < 1) { snowGrid[i] = Math.min(1, snowGrid[i] + snowRefill * dt * 0.05); texDirty = true; }
    }
  }

  // ---- Texture update (throttled) ----
  texTimer += dt;
  if (texDirty && texTimer > 0.12) {
    rebuildSnowTex(); texTimer = 0; texDirty = false; progressDirty = true;
  }

  // ---- Progress ----
  progTimer += dt;
  if (progressDirty && progTimer > 2) { updateProgress(); progTimer = 0; progressDirty = false; }

  // ---- Day/Night ----
  updateDayNight(dt);

  // ---- Minimap ----
  const mpp = onFoot && playerPed ? playerPed.position : vGroup.position;
  drawMinimap(mpp.x, mpp.z);

  renderer.render(scene, camera);
}

// Initial sky
scene.background = new THREE.Color(0xaabbcc);
animate();

console.log('%c✅ Schneeräum-Simulator V2 – IM NORDEN geladen!', 'color:#FFD600;font-weight:bold;font-size:14px');
</script>
